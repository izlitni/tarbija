<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarbija ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>

  /* ═══════════════════════════════════════════════
     TOKENS — Girl (default)
  ═══════════════════════════════════════════════ */
  :root {
    --bg-a:        #fce4f3;
    --bg-b:        #ebe8fd;
    --accent:      #f472b6;
    --accent2:     #a78bfa;
    --accent3:     #34d399;
    --soft-a:      #fce7f3;
    --soft-b:      #ede9fe;
    --border-c:    #f9a8d4;
    --border-out:  #e9d5ff;
    --glow:        #f472b644;
    --glow2:       #f472b622;
    --text:        #4a3f5c;
    --muted:       #b8a8cc;
    --card-bg:     #fffffff0;
    --crown:       "👑";

    --transition-theme: background .5s ease, color .4s ease,
                        border-color .4s ease, box-shadow .4s ease;
  }

  /* ═══════════════════════════════════════════════
     TOKENS — Boy
  ═══════════════════════════════════════════════ */
  [data-mode="boy"] {
    --bg-a:        #ddf4ff;
    --bg-b:        #d4f5ee;
    --accent:      #0ea5e9;
    --accent2:     #2dd4bf;
    --accent3:     #fbbf24;
    --soft-a:      #e0f2fe;
    --soft-b:      #ccfbf1;
    --border-c:    #7dd3fc;
    --border-out:  #a5f3fc;
    --glow:        #0ea5e944;
    --glow2:       #0ea5e922;
    --text:        #0f3d5c;
    --muted:       #6ab4cc;
    --card-bg:     #f0fbffee;
    --crown:       "⚡";
  }

  /* ═══════════════════════════════════════════════
     RESET & BASE
  ═══════════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem .9rem 1.4rem;
    overflow-x: hidden;
    transition: background .6s ease;
  }

  /* ═══════════════════════════════════════════════
     BACKGROUND BLOBS
  ═══════════════════════════════════════════════ */
  .blobs {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(40px);
    opacity: .22;
    transition: background .6s ease;
    animation: blob-drift 9s ease-in-out infinite;
  }
  .blob:nth-child(1) {
    width: clamp(180px,45vw,340px); height: clamp(180px,45vw,340px);
    background: var(--accent); top: -10%; left: -8%;
    animation-duration: 10s;
  }
  .blob:nth-child(2) {
    width: clamp(140px,35vw,260px); height: clamp(140px,35vw,260px);
    background: var(--accent2); bottom: -8%; right: -6%;
    animation-duration: 7s; animation-delay: -3s;
  }
  .blob:nth-child(3) {
    width: clamp(80px,18vw,140px); height: clamp(80px,18vw,140px);
    background: var(--accent3); top: 38%; right: 3%;
    animation-duration: 11s; animation-delay: -5s;
  }
  @keyframes blob-drift {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(12px,-16px) scale(1.06); }
    66%      { transform: translate(-8px,10px)  scale(.96); }
  }

  /* ═══════════════════════════════════════════════
     SPARKLES
  ═══════════════════════════════════════════════ */
  #sparkles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  .sparkle {
    position: absolute;
    animation: sp-float 6s ease-in-out infinite;
    font-size: clamp(.85rem, 2.5vw, 1.3rem);
    opacity: .55;
    user-select: none;
  }
  .sparkle:nth-child(1) { top:10%; left:10%; animation-delay:0s; }
  .sparkle:nth-child(2) { top:20%; right:9%; animation-delay:-2s;  font-size:.9em; }
  .sparkle:nth-child(3) { bottom:22%; left:14%; animation-delay:-4s; font-size:.8em; }
  .sparkle:nth-child(4) { bottom:12%; right:13%; animation-delay:-1s; }
  .sparkle:nth-child(5) { top:52%; left:4%; animation-delay:-3s; font-size:.75em; }
  .sparkle:nth-child(6) { top:36%; right:5%; animation-delay:-5s; }

  @keyframes sp-float {
    0%,100% { transform: translateY(0)    scale(1);   opacity:.5; }
    50%      { transform: translateY(-13px) scale(1.2); opacity:.9; }
  }

  /* ═══════════════════════════════════════════════
     CARD
  ═══════════════════════════════════════════════ */
  .card {
    position: relative; z-index: 1;
    background: var(--card-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 2px solid #ffffff80;
    border-radius: clamp(24px, 6vw, 36px);
    padding: clamp(1.4rem, 5vw, 2.4rem) clamp(1.2rem, 5vw, 2.2rem) clamp(1.2rem, 4vw, 2rem);
    width: 100%; max-width: 460px;
    box-shadow:
      0 2px 0 #ffffffaa inset,
      0 12px 48px #d8a0e82a,
      0 2px 8px #0001;
    transition: box-shadow .5s ease, background .5s ease;
    animation: card-in .65s cubic-bezier(.34,1.56,.64,1) both;
  }
  [data-mode="boy"] .card {
    box-shadow:
      0 2px 0 #ffffffaa inset,
      0 12px 48px #0ea5e922,
      0 2px 8px #0001;
  }
  @keyframes card-in {
    from { opacity:0; transform: translateY(26px) scale(.95); }
    to   { opacity:1; transform: translateY(0)    scale(1);   }
  }

  /* ═══════════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════════ */
  .header { text-align: center; margin-bottom: clamp(1rem, 4vw, 1.6rem); }

  .crown-emoji {
    display: block;
    font-size: clamp(1.4rem, 5vw, 2rem);
    margin-bottom: -.15em;
    animation: crown-bounce 2.2s ease-in-out infinite;
  }
  @keyframes crown-bounce {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-6px) rotate(5deg); }
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 11vw, 4.8rem);
    line-height: 1;
    letter-spacing: .02em;
    background: linear-gradient(135deg, var(--accent) 10%, var(--accent2) 90%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 3px 1px color-mix(in srgb, var(--accent) 30%, transparent));
    animation: logo-sway 4.5s ease-in-out infinite;
    transition: filter .5s ease;
  }
  @keyframes logo-sway {
    0%,100% { transform: rotate(-1.2deg); }
    50%      { transform: rotate( 1.2deg); }
  }

  .tagline {
    margin-top: .45rem;
    font-size: clamp(.72rem, 2.6vw, .86rem);
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .13em;
    text-transform: uppercase;
    transition: color .4s ease;
  }

  /* ═══════════════════════════════════════════════
     GENDER TOGGLE
  ═══════════════════════════════════════════════ */
  .toggle-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: clamp(.9rem, 3.5vw, 1.4rem);
  }

  .toggle-pill {
    position: relative;
    display: flex;
    background: linear-gradient(135deg, var(--soft-a), var(--soft-b));
    border: 2px solid var(--border-c);
    border-radius: 999px;
    padding: 4px;
    gap: 0;
    box-shadow: 0 2px 10px #0000001a, 0 1px 0 #fff8 inset;
    transition: border-color .4s ease, background .5s ease;
  }

  /* sliding highlight */
  #pillSlider {
    position: absolute;
    top: 4px; left: 4px;
    width: calc(50% - 4px);
    height: calc(100% - 8px);
    border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 3px 12px var(--glow);
    transition: transform .35s cubic-bezier(.34,1.3,.64,1),
                background .5s ease, box-shadow .4s ease;
    pointer-events: none;
    z-index: 0;
  }

  .toggle-btn {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: .35rem;
    padding: .42rem clamp(.7rem, 3vw, 1.1rem);
    border: none; background: transparent; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(.8rem, 3vw, .92rem);
    font-weight: 800;
    color: var(--muted);
    border-radius: 999px;
    transition: color .3s ease;
    letter-spacing: .04em;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .toggle-btn .btn-icon { font-size: 1.05em; }
  .toggle-btn.active    { color: #fff; }

  /* ═══════════════════════════════════════════════
     INPUT GROUP
  ═══════════════════════════════════════════════ */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: .55rem;
  }
  @media (min-width: 380px) { .input-group { flex-direction: row; } }

  input#name {
    flex: 1; min-width: 0;
    background: var(--soft-a);
    border: 2px solid var(--border-c);
    border-radius: 999px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: max(16px, clamp(.88rem, 3.2vw, 1rem));
    font-weight: 700;
    padding: .68rem 1.15rem;
    outline: none;
    transition: var(--transition-theme), box-shadow .2s;
    -webkit-tap-highlight-color: transparent;
  }
  input#name::placeholder { color: var(--muted); font-weight: 600; }
  input#name:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 4px var(--glow2);
  }

  button#enterBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 999px;
    color: #fff;
    cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(.9rem, 3.4vw, 1.05rem);
    letter-spacing: .05em;
    padding: .68rem 1.35rem;
    transition: transform .15s, box-shadow .25s, background .5s ease;
    box-shadow: 0 4px 18px var(--glow), 0 2px 0 #ffffff33 inset;
    white-space: nowrap;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  @media (min-width: 380px) { button#enterBtn { width: auto; } }
  button#enterBtn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 8px 26px var(--glow);
  }
  button#enterBtn:active { transform: scale(.96); }

  /* ═══════════════════════════════════════════════
     DIVIDER
  ═══════════════════════════════════════════════ */
  .divider {
    display: flex; align-items: center; gap: .7rem;
    margin: clamp(.9rem, 3.5vw, 1.4rem) 0;
    color: var(--muted);
    font-size: .74rem; font-weight: 800;
    letter-spacing: .14em; text-transform: uppercase;
    transition: color .4s ease;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 2px;
    background: linear-gradient(90deg, transparent, var(--border-out), transparent);
    border-radius: 1px;
    transition: background .5s ease;
  }

  /* ═══════════════════════════════════════════════
     OUTPUT
  ═══════════════════════════════════════════════ */
  .output-wrap {
    background: linear-gradient(135deg, var(--soft-a), var(--soft-b));
    border: 2px solid var(--border-out);
    border-radius: clamp(16px, 5vw, 22px);
    min-height: clamp(76px, 18vw, 96px);
    display: flex; align-items: center; justify-content: center;
    padding: .85rem 1.2rem;
    position: relative; overflow: hidden;
    transition: var(--transition-theme);
  }

  /* animated top stripe */
  .output-wrap::before {
    content: '';
    position: absolute; top: 0; left: -100%; right: 0; height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      var(--accent) 30%,
      var(--accent2) 60%,
      var(--accent3) 80%,
      transparent 100%);
    animation: stripe-sweep 3s linear infinite;
    border-radius: 20px 20px 0 0;
    transition: background .5s ease;
  }
  @keyframes stripe-sweep {
    from { transform: translateX(0); }
    to   { transform: translateX(200%); }
  }

  #output {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 8vw, 2.9rem);
    letter-spacing: .04em;
    text-align: center;
    background: linear-gradient(135deg, var(--accent) 10%, var(--accent2) 90%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 1px color-mix(in srgb, var(--accent) 20%, transparent));
    word-break: break-all; min-height: 1em; line-height: 1.2;
    transition: filter .4s ease;
  }

  #output:empty::before {
    content: '˚₊‧꒰ა ♡ ໒꒱ ‧₊˚';
    font-family: 'Nunito', sans-serif;
    font-size: clamp(.78rem, 2.8vw, .95rem);
    font-weight: 800;
    -webkit-text-fill-color: var(--muted);
    opacity: .6;
    animation: idle-pulse 2.6s ease-in-out infinite;
  }
  [data-mode="boy"] #output:empty::before { content: '~ waiting for a name ~'; }

  @keyframes idle-pulse {
    0%,100% { opacity:.35; } 50% { opacity:.8; }
  }

  @keyframes pop {
    0%   { transform: scale(.45) rotate(-7deg); opacity:0; }
    60%  { transform: scale(1.16) rotate(2.5deg); opacity:1; }
    80%  { transform: scale(.94)  rotate(-.8deg); }
    100% { transform: scale(1)    rotate(0deg);   opacity:1; }
  }
  #output.pop { animation: pop .48s cubic-bezier(.34,1.56,.64,1) forwards; }

  /* ═══════════════════════════════════════════════
     FOOTER
  ═══════════════════════════════════════════════ */
  footer {
    position: relative; z-index: 1;
    margin-top: clamp(.7rem, 2.5vw, 1.1rem);
    font-size: clamp(.68rem, 2.4vw, .78rem);
    font-weight: 700; color: var(--muted);
    text-align: center; letter-spacing: .06em; line-height: 1.9;
    transition: color .4s ease;
  }
  footer span { color: var(--accent); transition: color .4s ease; }
  a { color: var(--accent); text-decoration: none; font-weight: 800; transition: color .3s; }
  a:hover { text-decoration: underline; color: var(--accent2); }

  </style>
</head>
<body data-mode="girl">

  <div class="blobs">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <div id="sparkles"></div>

  <div class="card">

    <div class="header">
      <span class="crown-emoji">👑</span>
      <div class="logo">Tarbija</div>
      <p class="tagline">your name, but cuter ♡</p>
    </div>

    <!-- ── Gender toggle ── -->
    <div class="toggle-wrap">
      <div class="toggle-pill">
        <div id="pillSlider"></div>
        <button class="toggle-btn active" id="btnGirl">
          <span class="btn-icon">🌸</span> Girl
        </button>
        <button class="toggle-btn" id="btnBoy">
          <span class="btn-icon">⚡</span> Boy
        </button>
      </div>
    </div>

    <div class="input-group">
      <input
        type="text" id="name"
        placeholder="Type a name~"
        autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false"
      />
      <button id="enterBtn">Go! 🌸</button>
    </div>

    <div class="divider">ta-daa~</div>

    <div class="output-wrap">
      <div id="output"></div>
    </div>

  </div>

  <footer>
    press <span>Enter</span> or click <span>Go!</span> bish ta3mil tarbija ✨<br>
    Designed by claude ^_^&nbsp;&nbsp;·&nbsp;&nbsp;Developed by <a href="https://github.com/izlitni">izlitni</a> ;)
  </footer>

  <script src="script.js"></script>
</body>
</html>
