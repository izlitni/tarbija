<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarbija вңЁ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* в”Җв”Җ Variables в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    :root {
      --bg-from:   #fde8f5;
      --bg-to:     #e8eafd;
      --card:      #ffffffcc;
      --pink:      #f472b6;
      --pink-soft: #fce7f3;
      --lavender:  #a78bfa;
      --lav-soft:  #ede9fe;
      --mint:      #34d399;
      --peach:     #fb923c;
      --text:      #4a3f5c;
      --muted:     #b8a8cc;
      --shadow:    0 8px 40px #d8a0e833;

      /* spacing scale */
      --space-xs:  0.4rem;
      --space-sm:  0.75rem;
      --space-md:  1.2rem;
      --space-lg:  1.8rem;
      --space-xl:  2.4rem;
    }

    /* в”Җв”Җ Reset в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* в”Җв”Җ Body вҖ” mobile first в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    body {
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      min-height: 100dvh;          /* dynamic viewport on mobile */
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-md) var(--space-sm);
      overflow-x: hidden;
    }

    /* в”Җв”Җ Floating shapes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .shapes {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: .15;
      animation: floaty 7s ease-in-out infinite;
    }
    /* smaller on mobile, grow on larger screens */
    .shape:nth-child(1) { width:160px; height:160px; background:var(--pink);     top:-50px;   left:-40px;  animation-duration:8s; }
    .shape:nth-child(2) { width:120px; height:120px; background:var(--lavender); bottom:-30px;right:-30px; animation-duration:6s; animation-delay:-3s; }
    .shape:nth-child(3) { width: 80px; height: 80px; background:var(--mint);     top:40%;     right:4%;    animation-duration:9s; animation-delay:-1.5s; }
    .shape:nth-child(4) { width: 60px; height: 60px; background:var(--peach);    bottom:15%;  left:5%;     animation-duration:7s; animation-delay:-4s; }

    @media (min-width: 480px) {
      .shape:nth-child(1) { width:220px; height:220px; }
      .shape:nth-child(2) { width:160px; height:160px; }
      .shape:nth-child(3) { width:110px; height:110px; }
      .shape:nth-child(4) { width: 75px; height: 75px; }
    }
    @media (min-width: 768px) {
      .shape:nth-child(1) { width:260px; height:260px; top:-80px; left:-60px; }
      .shape:nth-child(2) { width:180px; height:180px; }
      .shape:nth-child(3) { width:120px; height:120px; }
      .shape:nth-child(4) { width: 80px; height: 80px; }
    }

    @keyframes floaty {
      0%,100% { transform: translateY(0)     rotate(0deg); }
      50%      { transform: translateY(-18px) rotate(8deg); }
    }

    /* в”Җв”Җ Sparkles в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .sparkle {
      position: fixed;
      animation: sparkle-float 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
      opacity: .5;
      /* smaller on mobile */
      font-size: 1rem;
    }
    @media (min-width: 480px) { .sparkle { font-size: 1.2rem; } }
    @media (min-width: 768px) { .sparkle { font-size: 1.4rem; } }

    .sparkle:nth-child(1) { top:10%; left:10%; animation-delay:0s; }
    .sparkle:nth-child(2) { top:18%; right:9%; animation-delay:-2s;  font-size:.85rem; }
    .sparkle:nth-child(3) { bottom:20%; left:14%; animation-delay:-4s; font-size:.8rem; }
    .sparkle:nth-child(4) { bottom:12%; right:12%; animation-delay:-1s; }
    .sparkle:nth-child(5) { top:52%; left:4%;   animation-delay:-3s; font-size:.75rem; }
    .sparkle:nth-child(6) { top:38%; right:5%;  animation-delay:-5s; }

    @keyframes sparkle-float {
      0%,100% { transform: translateY(0)     scale(1);   opacity:.5; }
      50%      { transform: translateY(-12px) scale(1.2); opacity:.9; }
    }

    /* в”Җв”Җ Card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid #ffffff99;
      border-radius: 28px;
      padding: var(--space-lg) var(--space-md) var(--space-md);
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow), 0 2px 0 #fff inset;
      animation: card-in .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @media (min-width: 480px) {
      .card { border-radius: 32px; padding: var(--space-xl) var(--space-xl) var(--space-lg); }
    }

    @keyframes card-in {
      from { opacity:0; transform: translateY(28px) scale(.96); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    /* в”Җв”Җ Header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .header { text-align: center; margin-bottom: var(--space-lg); }

    .crown {
      font-size: 1.6rem;
      display: block;
      margin-bottom: -.2rem;
      animation: crown-bounce 2s ease-in-out infinite;
    }
    @media (min-width: 480px) { .crown { font-size: 2rem; } }

    @keyframes crown-bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      /* fluid type: looks great from 320px to 1440px */
      font-size: clamp(2.6rem, 12vw, 4.6rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 0 #f472b640);
      animation: logo-wobble 4s ease-in-out infinite;
    }

    @keyframes logo-wobble {
      0%,100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate( 1.5deg); }
    }

    .tagline {
      margin-top: .5rem;
      font-size: clamp(.75rem, 3vw, .9rem);
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* в”Җв”Җ Input group в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .input-group {
      display: flex;
      flex-direction: column;   /* stack on very small screens */
      gap: var(--space-sm);
    }
    @media (min-width: 380px) {
      .input-group { flex-direction: row; }
    }

    input#name {
      flex: 1;
      min-width: 0;             /* flex shrink fix */
      background: var(--pink-soft);
      border: 2px solid #f9a8d4;
      border-radius: 999px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: clamp(.9rem, 3.5vw, 1.05rem);
      font-weight: 700;
      padding: .72rem 1.1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      /* prevent iOS zoom on focus (font-size >= 16px) */
      font-size: max(16px, clamp(.9rem, 3.5vw, 1.05rem));
    }

    input#name::placeholder { color: #d8a8c8; font-weight: 600; }
    input#name:focus {
      border-color: var(--pink);
      background: #fff;
      box-shadow: 0 0 0 4px #f472b622;
    }

    button#enterBtn {
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      border: none;
      border-radius: 999px;
      color: #fff;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(.95rem, 3.5vw, 1.1rem);
      letter-spacing: .04em;
      padding: .72rem 1.4rem;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px #f472b644, 0 2px 0 #fff2 inset;
      white-space: nowrap;
      /* full-width on tiny screens when stacked */
      width: 100%;
    }
    @media (min-width: 380px) {
      button#enterBtn { width: auto; }
    }

    button#enterBtn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px #f472b655;
    }
    button#enterBtn:active { transform: scale(.97); }

    /* в”Җв”Җ Divider в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .divider {
      display: flex; align-items: center; gap: .8rem;
      margin: var(--space-md) 0;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 2px;
      background: linear-gradient(90deg, transparent, #e9d5ff, transparent);
      border-radius: 1px;
    }

    /* в”Җв”Җ Output в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    .output-wrap {
      background: linear-gradient(135deg, var(--pink-soft), var(--lav-soft));
      border: 2px solid #e9d5ff;
      border-radius: 20px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-sm) var(--space-md);
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 480px) { .output-wrap { min-height: 90px; border-radius: 24px; } }

    .output-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--mint));
      border-radius: 20px 20px 0 0;
    }

    #output {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.7rem, 8vw, 2.8rem);
      letter-spacing: .05em;
      text-align: center;
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 0 #f9a8d455);
      word-break: break-all;
      min-height: 1em;
      line-height: 1.2;
    }

    #output:empty::before {
      content: 'ЛҡвӮҠвҖ§к’°бғҗ вҷЎ а»’к’ұ вҖ§вӮҠЛҡ';
      font-family: 'Nunito', sans-serif;
      font-size: clamp(.8rem, 3vw, 1rem);
      font-weight: 800;
      -webkit-text-fill-color: var(--muted);
      opacity: .6;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: .4; } 50% { opacity: .9; }
    }

    @keyframes pop {
      0%   { transform: scale(.5) rotate(-6deg); opacity: 0; }
      65%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
      82%  { transform: scale(.95) rotate(-1deg); }
      100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }
    #output.pop { animation: pop .5s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* в”Җв”Җ Footer в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    footer {
      position: relative; z-index: 1;
      margin-top: var(--space-sm);
      font-size: clamp(.72rem, 2.8vw, .82rem);
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      letter-spacing: .06em;
      line-height: 1.8;
    }
    footer span { color: var(--pink); }

    a {
      color: var(--pink);
      text-decoration: none;
      font-weight: 800;
    }
    a:hover { text-decoration: underline; color: var(--lavender); }

    /* в”Җв”Җ Tap highlight removal (mobile) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
    button, input { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>

  <div class="shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <span class="sparkle">вңЁ</span>
  <span class="sparkle">рҹҢё</span>
  <span class="sparkle">вӯҗ</span>
  <span class="sparkle">рҹ’–</span>
  <span class="sparkle">рҹҢ·</span>
  <span class="sparkle">вңҝ</span>

  <div class="card">
    <div class="header">
      <span class="crown">рҹ‘‘</span>
      <div class="logo">Tarbija</div>
      <p class="tagline">your name, but cuter вҷЎ</p>
    </div>

    <div class="input-group">
      <input type="text" id="name" placeholder="Type a name~" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button id="enterBtn">Go! рҹҢё</button>
    </div>

    <div class="divider">ta-daa~</div>

    <div class="output-wrap">
      <div id="output"></div>
    </div>
  </div>

  <footer>
    press <span>Enter</span> or click <span>Go!</span> bish ta3mil tarbija вңЁ<br>

  </footer>

  <script src="script.js"></script>
</body>
</html>
