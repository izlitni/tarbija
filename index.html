<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarbija ✨</title>
  <link rel="icon" href="/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-from:   #fde8f5;
      --bg-to:     #e8eafd;
      --card:      #ffffffcc;
      --pink:      #f472b6;
      --pink-soft: #fce7f3;
      --lavender:  #a78bfa;
      --lav-soft:  #ede9fe;
      --mint:      #34d399;
      --peach:     #fb923c;
      --text:      #4a3f5c;
      --muted:     #b8a8cc;
      --shadow:    0 8px 40px #d8a0e833;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow: hidden;
    }

    /* ── Floating shapes ──────────────────────────── */
    .shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: .18;
      animation: floaty 7s ease-in-out infinite;
    }
    .shape:nth-child(1) { width:260px; height:260px; background: var(--pink);     top:-80px;  left:-60px;  animation-duration: 8s; }
    .shape:nth-child(2) { width:180px; height:180px; background: var(--lavender); bottom:-50px; right:-40px; animation-duration: 6s; animation-delay: -3s; }
    .shape:nth-child(3) { width:120px; height:120px; background: var(--mint);     top:40%;    right:5%;    animation-duration: 9s; animation-delay: -1.5s; }
    .shape:nth-child(4) { width: 80px; height: 80px; background: var(--peach);    bottom:15%; left:8%;     animation-duration: 7s; animation-delay: -4s; }

    @keyframes floaty {
      0%,100% { transform: translateY(0)   rotate(0deg); }
      50%      { transform: translateY(-20px) rotate(8deg); }
    }

    /* ── Floating sparkles ────────────────────────── */
    .sparkle {
      position: fixed;
      font-size: 1.3rem;
      animation: sparkle-float 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
      opacity: .55;
    }
    .sparkle:nth-child(1) { top: 12%; left: 14%; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 22%; right:12%; animation-delay: -2s; font-size:1rem; }
    .sparkle:nth-child(3) { bottom:22%; left:18%; animation-delay: -4s; font-size:.9rem; }
    .sparkle:nth-child(4) { bottom:14%; right:16%; animation-delay: -1s; }
    .sparkle:nth-child(5) { top:55%;  left:6%;   animation-delay: -3s; font-size:.8rem; }
    .sparkle:nth-child(6) { top:40%;  right:6%;  animation-delay: -5s; }

    @keyframes sparkle-float {
      0%,100% { transform: translateY(0)    scale(1);    opacity: .55; }
      50%      { transform: translateY(-14px) scale(1.2); opacity: .9; }
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid #ffffff99;
      border-radius: 32px;
      padding: 2.8rem 2.4rem 2.4rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow), 0 2px 0 #fff inset;
      animation: card-in .7s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes card-in {
      from { opacity:0; transform: translateY(30px) scale(.95); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    /* ── Header ───────────────────────────────────── */
    .header { text-align: center; margin-bottom: 2rem; }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(3rem, 11vw, 4.6rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 0 #f472b640);
      animation: logo-wobble 4s ease-in-out infinite;
    }

    @keyframes logo-wobble {
      0%,100% { transform: rotate(-1.5deg); }
      50%      { transform: rotate( 1.5deg); }
    }

    .crown { font-size: 2rem; display: block; margin-bottom: -.3rem; animation: crown-bounce 2s ease-in-out infinite; }

    @keyframes crown-bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }

    .tagline {
      margin-top: .6rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ── Input group ──────────────────────────────── */
    .input-group { display: flex; gap: .6rem; }

    input#name {
      flex: 1;
      background: var(--pink-soft);
      border: 2px solid #f9a8d4;
      border-radius: 999px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: .7rem 1.2rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input#name::placeholder { color: #d8a8c8; font-weight: 600; }

    input#name:focus {
      border-color: var(--pink);
      background: #fff;
      box-shadow: 0 0 0 4px #f472b622;
    }

    button#enterBtn {
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      border: none;
      border-radius: 999px;
      color: #fff;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      letter-spacing: .04em;
      padding: .7rem 1.4rem;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px #f472b644, 0 2px 0 #fff2 inset;
      white-space: nowrap;
    }

    button#enterBtn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 24px #f472b655;
    }

    button#enterBtn:active { transform: scale(.97); }

    /* ── Divider ──────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: .8rem;
      margin: 1.6rem 0;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 2px;
      background: linear-gradient(90deg, transparent, #e9d5ff, transparent);
      border-radius: 1px;
    }

    /* ── Output ───────────────────────────────────── */
    .output-wrap {
      background: linear-gradient(135deg, var(--pink-soft), var(--lav-soft));
      border: 2px solid #e9d5ff;
      border-radius: 24px;
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.4rem;
      position: relative;
      overflow: hidden;
    }

    /* top ribbon */
    .output-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--mint));
      border-radius: 24px 24px 0 0;
    }

    #output {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 7vw, 2.8rem);
      letter-spacing: .05em;
      text-align: center;
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 0 #f9a8d455);
      word-break: break-all;
      min-height: 1em;
    }

    #output:empty::before {
      content: '˚₊‧꒰ა ♡ ໒꒱ ‧₊˚';
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      -webkit-text-fill-color: var(--muted);
      opacity: .6;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: .4; } 50% { opacity: .9; }
    }

    @keyframes pop {
      0%   { transform: scale(.5) rotate(-6deg); opacity: 0; }
      65%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
      82%  { transform: scale(.95) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg);    opacity: 1; }
    }

    #output.pop { animation: pop .5s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* ── Footer ───────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      margin-top: 1.4rem;
      font-size: .8rem;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      letter-spacing: .06em;
    }

    footer span { color: var(--pink); }

    a {
      color: var(--pink);
      text-decoration: none;
      font-weight: 800;
    }

    a:hover {
      text-decoration: underline;
    }

    footer a:hover {
      text-decoration: underline;
      color: var(--lavender);
    }
  </style>
</head>
<body>

  <!-- background shapes -->
  <div class="shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <!-- floating sparkles -->
  <span class="sparkle">✨</span>
  <span class="sparkle">🌸</span>
  <span class="sparkle">⭐</span>
  <span class="sparkle">💖</span>
  <span class="sparkle">🌷</span>
  <span class="sparkle">✿</span>

  <div class="card">
    <div class="header">
      <span class="crown">👑</span>
      <div class="logo">Tarbija</div>
      <p class="tagline">your name, but cuter ♡</p>
    </div>

    <div class="input-group">
      <input type="text" id="name" placeholder="Type a name~" autocomplete="off"/>
      <button id="enterBtn">Go! 🌸</button>
    </div>

    <div class="divider">ta-daa~</div>

    <div class="output-wrap">
      <div id="output"></div>
    </div>
  </div>

  <footer>press <span>Enter</span> or click <span>Go!</span> bish ta3mil tarbija ✨</footer>
  <footer>Designed by claude ^_^<br>Developed by <a href="https://github.com/izlitni">izlitni</a> ;)</footer>
  <script src="script.js"></script>
</body>
</html>
